<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Live TV</title>
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.15); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow-x: hidden; }

        /* REMOTE FOCUS STYLE FROM HOME */
        :focus { outline: none; border: 3px solid var(--brand-blue) !important; transform: scale(1.1); box-shadow: 0 0 25px var(--brand-blue); z-index: 10; background: rgba(0, 100, 255, 0.2); }

        /* NAV BAR (SYNCED WITH HOME) */
        .nav-container { background: rgba(4, 7, 20, 0.7); backdrop-filter: blur(20px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        @media (min-width: 600px) {
            .nav-container { position: sticky; top: 20px; width: fit-content; margin: 0 auto; border-radius: 50px; padding: 12px 40px; display: flex; gap: 40px; }
            .tv-logo { position: fixed; bottom: 40px; right: 50px; font-size: 2.5em; color: var(--brand-blue); font-weight: bold; }
        }
        @media (max-width: 599px) {
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; }
            body { padding-bottom: 80px; }
        }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; border-radius: 10px; padding: 5px; }
        .nav-link.active { color: var(--brand-blue); text-shadow: 0 0 10px var(--brand-blue); }
        .icon { width: 24px; height: 24px; fill: currentColor; }

        /* LIVE TV CONTENT */
        .preview-window { height: 50vh; background: #000; display: flex; align-items: center; justify-content: center; font-size: 1.5em; margin-bottom: 20px; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 0 60px 40px; }
        .channel-card { background: var(--glass); padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
    </style>
</head>
<body>
    <div class="tv-logo">str▶eam</div>
    <nav class="nav-container">
        <a href="stream-home.html" class="nav-link" tabindex="1"><svg class="icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></a>
        <a href="live-tv.html" class="nav-link active" tabindex="2"><svg class="icon" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg><span>Live TV</span></a>
        <a href="discover.html" class="nav-link" tabindex="3"><svg class="icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span>Discover</span></a>
        <a href="profile.html" class="nav-link" tabindex="4"><svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Profile</span></a>
    </nav>

    <div class="preview-window">SELECT A CHANNEL TO WATCH</div>

    <div class="channel-grid">
        <div class="channel-card" tabindex="5">FIFA+</div>
        <div class="channel-card" tabindex="6">NASA TV</div>
        <div class="channel-card" tabindex="7">AL JAZEERA</div>
        <div class="channel-card" tabindex="8">RED BULL TV</div>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            const focusable = Array.from(document.querySelectorAll('a, .channel-card'));
            let index = focusable.indexOf(document.activeElement);
            if (e.key === "ArrowRight") index = (index + 1) % focusable.length;
            if (e.key === "ArrowLeft") index = (index - 1 + focusable.length) % focusable.length;
            if (e.key === "ArrowDown") index = (index + 4) % focusable.length;
            if (e.key === "ArrowUp") index = (index - 4 + focusable.length) % focusable.length;
            focusable[index]?.focus();
        });
    </script>
</body>
            </html>
