<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Live TV</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding-bottom: 100px; }

        .nav-container { background: rgba(4, 7, 20, 0.7); backdrop-filter: blur(20px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        @media (min-width: 1024px) {
            .nav-container { position: sticky; top: 20px; width: fit-content; margin: 0 auto; border-radius: 50px; padding: 12px 40px; display: flex; gap: 60px; }
            .tv-logo { position: fixed; bottom: 30px; right: 40px; font-size: 2.2em; color: var(--brand-blue); font-weight: bold; opacity: 0.8; }
            body { padding-bottom: 20px; }
        }
        @media (max-width: 1023px) {
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; }
            .logo-top { text-align: center; padding: 15px 0; font-size: 2em; color: var(--brand-blue); font-weight: bold; }
        }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-link.active { color: var(--brand-blue); font-weight: bold; }
        .icon { width: 24px; height: 24px; fill: currentColor; }

        .player-wrapper { width: 100%; max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .video-js { width: 100%; aspect-ratio: 16/9; border-radius: 12px; }
        .grid { max-width: 1000px; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--glass); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border: 1px solid var(--brand-blue); transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="logo-top">str▶eam</div>
    <div class="tv-logo">str▶eam</div>

    <nav class="nav-container">
        <a href="stream-home.html" class="nav-link">
            <svg class="icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
        <a href="live-tv.html" class="nav-link active">
            <svg class="icon" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
            <span>Live TV</span>
        </a>
        <a href="profile.html" class="nav-link">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Profile</span>
        </a>
    </nav>

    <div class="player-wrapper">
        <video id="main-video" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>
    <div class="grid" id="grid"></div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script type="module">
        const channels = [
            { name: "FIFA Plus", url: "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8" },
            { name: "Red Bull TV", url: "https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8" },
            { name: "Sky News", url: "https://skynews-skynews-main-1-gb.samsung.wurl.com/manifest/playlist.m3u8" }
        ];

        const player = videojs('main-video');
        const grid = document.getElementById('grid');

        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<strong>${ch.name}</strong>`;
            div.onclick = () => { player.src({src: ch.url, type: 'application/x-mpegURL'}); player.play(); };
            grid.appendChild(div);
        });
        player.src({src: channels[0].url, type: 'application/x-mpegURL'});
    </script>
</body>
</html>
