<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Live TV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #e50914; /* Netflix-style Red */
        }

        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* The Glass Navigation Bar (TV Mode) */
        .glass-nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 10px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .glass-nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .glass-nav a:hover, .glass-nav a.active {
            opacity: 1;
            color: var(--accent-color);
        }

        /* Glass Search Icon/Input */
        .search-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 5px 15px;
            border: 1px solid var(--glass-border);
        }

        .search-container input {
            background: transparent;
            border: none;
            color: white;
            padding-left: 10px;
            outline: none;
        }

        /* Video Player Area */
        .player-section {
            width: 100vw;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 80px;
        }

        .video-js {
            width: 90% !important;
            height: 100% !important;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Channel List Styling */
        .channel-grid {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .channel-card {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .channel-card:hover {
            transform: scale(1.05);
            border-color: var(--accent-color);
        }

        /* TV Branding Logo (Bottom Right) */
        .tv-logo {
            position: fixed;
            bottom: 30px;
            right: 40px;
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <a href="stream-home.html">Home</a>
        <a href="live-tv.html" class="active">Live TV</a>
        <a href="#">Movies</a>
        <div class="search-container">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" placeholder="Search channels...">
        </div>
    </nav>

    <div class="player-section">
        <video id="tv-player" class="video-js vjs-big-play-centered"></video>
    </div>

    <div class="channel-grid">
        <div class="channel-card" onclick="playStream('https://nasa-i.akamaihd.net/hls/live/253565/NASA-NTV1-Public/master.m3u8')">
            <h3>NASA TV</h3>
        </div>
        <div class="channel-card" onclick="playStream('https://live-hls-web-aje.akamaized.net/hls/live/203661/aje/index.m3u8')">
            <h3>Al Jazeera</h3>
        </div>
    </div>

    <div class="tv-logo">str▶eam</div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const player = videojs('tv-player', {
            controls: true,
            autoplay: false,
            preload: 'auto',
            fluid: true
        });

        function playStream(url) {
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
