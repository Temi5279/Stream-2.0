<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Live TV Glass</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --card-bg: rgba(18, 23, 45, 0.6); }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            padding-bottom: 100px; 
        }

        /* --- LIQUID GLASS NAVIGATION --- */
        .nav-container { 
            background: rgba(4, 7, 20, 0.7); 
            backdrop-filter: blur(20px); 
            z-index: 1000; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* TV & Laptop: Centered Floating Pill */
        @media (min-width: 1024px) {
            .nav-container { 
                position: sticky; top: 20px; width: fit-content; 
                margin: 0 auto; border-radius: 50px; padding: 12px 40px; 
                display: flex; justify-content: center; 
            }
            .nav-items { display: flex; gap: 60px; }
            .nav-link { font-size: 1.1em; }
            .tv-logo { position: fixed; bottom: 30px; right: 40px; font-size: 2.2em; color: var(--brand-blue); font-weight: bold; opacity: 0.8; pointer-events: none; z-index: 100; }
            .logo-mobile { display: none; }
            body { padding-bottom: 20px; }
        }

        /* Mobile: Bottom Glass Bar */
        @media (max-width: 1023px) {
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; border-bottom: none; }
            .nav-items { width: 100%; display: flex; justify-content: space-around; }
            .nav-link { font-size: 0.75em; display: flex; flex-direction: column; align-items: center; gap: 4px; }
            .logo-mobile { display: block; text-align: center; padding: 15px 0; font-size: 2em; color: var(--brand-blue); font-weight: bold; }
            .tv-logo { display: none; }
        }

        .nav-link { color: rgba(255, 255, 255, 0.5); text-decoration: none; transition: 0.3s; }
        .nav-link.active { color: var(--brand-blue); font-weight: bold; text-shadow: 0 0 10px var(--brand-blue); }
        .nav-link:hover { color: white; transform: scale(1.1); }
        .icon { width: 24px; height: 24px; fill: currentColor; }

        /* --- PLAYER & CONTENT --- */
        .player-section { width: 100%; max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .video-js { width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        .search-container { max-width: 600px; margin: 30px auto; padding: 0 20px; }
        .search-bar { width: 100%; padding: 15px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg); color: white; outline: none; backdrop-filter: blur(10px); }

        .channel-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .channel-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); }
        .channel-card:hover { transform: translateY(-10px); border-color: var(--brand-blue); background: rgba(0, 100, 255, 0.1); }
        .channel-card strong { display: block; font-size: 1em; margin-bottom: 5px; }
        .channel-card span { font-size: 0.7em; color: var(--brand-blue); font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="logo-mobile">str▶eam</div>
    <div class="tv-logo">str▶eam</div>

    <nav class="nav-container">
        <div class="nav-items">
            <a href="stream-home.html" class="nav-link">
                <svg class="icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Home</span>
            </a>
            <a href="live-tv.html" class="nav-link active">
                <svg class="icon" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
                <span>Live TV</span>
            </a>
            <a href="discover.html" class="nav-link">
                <svg class="icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <span>Discover</span>
            </a>
            <a href="profile.html" class="nav-link">
                <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>Profile</span>
            </a>
        </div>
    </nav>

    <div class="player-section">
        <video id="main-video" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div class="search-container">
        <input type="text" id="search" class="search-bar" placeholder="Search live channels (News, Sports, Kids)...">
    </div>

    <div class="channel-grid" id="grid"></div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('main-video');

        const channels = [
            { name: "FIFA Plus", url: "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8", cat: "Sports" },
            { name: "Red Bull TV", url: "https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8", cat: "Sports" },
            { name: "Sky News", url: "https://skynews-skynews-main-1-gb.samsung.wurl.com/manifest/playlist.m3u8", cat: "News" },
            { name: "ABC News", url: "https://abcnews-live-us-east-1.fastly.net/master.m3u8", cat: "News" },
            { name: "Al Jazeera", url: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8", cat: "News" },
            { name: "NASA Public", url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8", cat: "Science" },
            { name: "Bloomberg TV", url: "https://liveproduction6.akamaized.net/hls/live/2042780/bloomberg_us/master.m3u8", cat: "Business" },
            { name: "Rakuten Action", url: "https://rakuten-actionmovies-1-nl.samsung.wurl.com/manifest/playlist.m3u8", cat: "Movies" },
            { name: "Lego Channel", url: "https://vcp-v-eu-west-1.vcp.samsung.com/159/manifest/playlist.m3u8", cat: "Kids" },
            { name: "ISS Live Earth", url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV2-HLS/master.m3u8", cat: "Science" }
        ];

        function renderChannels(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            data.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `<strong>${ch.name}</strong><span>${ch.cat}</span>`;
                card.onclick = () => {
                    player.src({ src: ch.url, type: 'application/x-mpegURL' });
                    player.play();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                grid.appendChild(card);
            });
        }

        document.getElementById('search').oninput = (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = channels.filter(ch => ch.name.toLowerCase().includes(query) || ch.cat.toLowerCase().includes(query));
            renderChannels(filtered);
        };

        // Initialize
        renderChannels(channels);
        player.src({ src: channels[0].url, type: 'application/x-mpegURL' });
    </script>
</body>
    </html>
