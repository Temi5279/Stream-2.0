<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Live TV</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow-x: hidden; }

        /* UNIFIED RESPONSIVE NAV */
        .nav-container { background: rgba(4, 7, 20, 0.8); backdrop-filter: blur(20px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        @media (min-width: 600px) { /* TV/Desktop */
            .nav-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: fit-content; border-radius: 50px; padding: 10px 40px; display: flex; gap: 30px; }
            .preview-area { margin-top: 0; }
        }
        @media (max-width: 599px) { /* Mobile */
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 12px 0; border-radius: 20px 20px 0 0; }
            body { padding-bottom: 80px; }
        }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; display: flex; flex-direction: column; align-items: center; transition: 0.3s; padding: 5px 15px; border-radius: 20px; }
        .nav-link.active { color: var(--brand-blue); font-weight: bold; }
        :focus { outline: none; border: 3px solid var(--brand-blue) !important; transform: scale(1.05); background: rgba(0, 100, 255, 0.1); }

        /* CONTENT */
        .preview-area { height: 55vh; width: 100%; background: #000; position: relative; }
        .video-js { width: 100% !important; height: 100% !important; }
        .grid { display: flex; gap: 15px; padding: 20px 40px; overflow-x: auto; scrollbar-width: none; }
        .channel-card { min-width: 200px; height: 100px; background: var(--glass); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid transparent; flex-shrink: 0; }
    </style>
</head>
<body>
    <nav class="nav-container">
        <a href="index.html" class="nav-link" tabindex="1">Home</a>
        <a href="live-tv.html" class="nav-link active" tabindex="2">Live TV</a>
        <a href="discover.html" class="nav-link" tabindex="3">Discover</a>
        <a href="profile.html" class="nav-link" tabindex="4">Profile</a>
    </nav>

    <div class="preview-area">
        <video id="tv-player" class="video-js" muted autoplay></video>
    </div>

    <div class="grid" id="channel-grid"></div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('tv-player');
        const channels = [
            { name: "FIFA+", url: "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8" },
            { name: "NASA", url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8" },
            { name: "Red Bull TV", url: "https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8" }
        ];

        const grid = document.getElementById('channel-grid');
        channels.forEach((ch, i) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.tabIndex = 10 + i;
            card.innerText = ch.name;
            card.onfocus = () => {
                player.src({ src: ch.url, type: 'application/x-mpegURL' });
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            };
            grid.appendChild(card);
        });

        document.addEventListener('keydown', (e) => {
            const items = Array.from(document.querySelectorAll('[tabindex]'));
            let current = items.indexOf(document.activeElement);
            if (e.key === "ArrowRight") current = (current + 1) % items.length;
            if (e.key === "ArrowLeft") current = (current - 1 + items.length) % items.length;
            if (e.key === "ArrowDown" && current < 4) current = 4;
            if (e.key === "ArrowUp" && current >= 4) current = 1;
            items[current]?.focus();
        });
    </script>
</body>
    </html>
