<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Live TV & Previews</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow: hidden; height: 100vh; }

        /* REMOTE FOCUS GLOW */
        :focus { outline: none; border: 3px solid var(--brand-blue) !important; transform: scale(1.08); box-shadow: 0 0 30px var(--brand-blue); background: rgba(0, 100, 255, 0.2); transition: 0.2s; z-index: 10; }

        /* HEADER NAV */
        .nav-container { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(4, 7, 20, 0.8); backdrop-filter: blur(20px); 
            display: flex; gap: 30px; padding: 10px 40px; border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 100; 
        }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 1.1em; padding: 5px 15px; border-radius: 20px; }
        .nav-link.active { color: var(--brand-blue); font-weight: bold; }

        /* PREVIEW PLAYER AREA */
        .preview-area { height: 60vh; width: 100%; position: relative; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }
        .preview-info { position: absolute; bottom: 40px; left: 60px; z-index: 5; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        /* CHANNEL SELECTION GRID */
        .channel-list-container { height: 40vh; padding: 20px 60px; background: linear-gradient(to bottom, transparent, var(--bg-dark)); }
        .grid { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; padding: 10px; }
        .grid::-webkit-scrollbar { display: none; }
        
        .channel-card { 
            min-width: 220px; height: 120px; background: var(--glass); 
            border-radius: 15px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .channel-card strong { font-size: 1.2em; }
        .channel-card span { font-size: 0.7em; color: var(--brand-blue); margin-top: 5px; }

        .tv-watermark { position: fixed; bottom: 30px; right: 40px; font-size: 2em; color: var(--brand-blue); font-weight: bold; opacity: 0.6; }
    </style>
</head>
<body>

    <nav class="nav-container">
        <a href="stream-home.html" class="nav-link" tabindex="1">Home</a>
        <a href="live-tv.html" class="nav-link active" tabindex="2">Live TV</a>
        <a href="discover.html" class="nav-link" tabindex="3">Discover</a>
        <a href="profile.html" class="nav-link" tabindex="4">Profile</a>
    </nav>

    <div class="preview-area">
        <video id="tv-player" class="video-js" muted autoplay></video>
        <div class="preview-info">
            <h1 id="playing-title">NOW PREVIEWING</h1>
            <p id="playing-desc">Select a channel below to start watching live.</p>
        </div>
    </div>

    <div class="channel-list-container">
        <h2 style="font-size: 1em; color: #888;">BROWSE CHANNELS</h2>
        <div class="grid" id="channel-grid">
            </div>
    </div>

    <div class="tv-watermark">str▶eam</div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('tv-player');
        
        const channels = [
            { name: "NASA LIVE", desc: "Space Exploration Previews", url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8" },
            { name: "SKY NEWS", desc: "World News 24/7", url: "https://skynews-skynews-main-1-gb.samsung.wurl.com/manifest/playlist.m3u8" },
            { name: "FIFA+", desc: "Football Highlights & Live", url: "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8" },
            { name: "RED BULL TV", desc: "Extreme Sports Preview", url: "https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8" }
        ];

        const grid = document.getElementById('channel-grid');

        // Build the grid
        channels.forEach((ch, i) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.tabIndex = 10 + i;
            card.innerHTML = `<strong>${ch.name}</strong><span>${ch.desc}</span>`;
            
            // Trigger when highlighted (remote focus) or clicked
            const switchChannel = () => {
                player.src({ src: ch.url, type: 'application/x-mpegURL' });
                document.getElementById('playing-title').innerText = ch.name;
                document.getElementById('playing-desc').innerText = ch.desc;
                player.play();
            };

            card.onfocus = switchChannel; // Auto-preview when remote moves to it
            card.onclick = switchChannel;
            grid.appendChild(card);
        });

        // SPATIAL NAVIGATION (The Remote Code)
        document.addEventListener('keydown', (e) => {
            const items = Array.from(document.querySelectorAll('[tabindex]'));
            let current = items.indexOf(document.activeElement);

            if (e.key === "ArrowRight") current = (current + 1) % items.length;
            if (e.key === "ArrowLeft") current = (current - 1 + items.length) % items.length;
            if (e.key === "ArrowUp" && current > 3) current = 1; // Jump back to Nav
            if (e.key === "ArrowDown" && current <= 3) current = 4; // Jump to Channels

            items[current]?.focus();
            
            // Auto-scroll the grid into view if needed
            if (document.activeElement.className === 'channel-card') {
                document.activeElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        });

        // Start with the first channel as preview
        player.src({ src: channels[0].url, type: 'application/x-mpegURL' });
    </script>
</body>
</html>
