<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Global Live TV</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#040714">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #040714; color: white; margin: 0; padding: 20px; padding-bottom: 80px; }
        
        /* THE ALL-BLUE LOGO */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 2.5em; letter-spacing: -1px; color: #0064ff; } /* Both str and eam are blue now */
        .header p { color: #a9a9a9; margin-top: 5px; }
        
        .player-wrapper { width: 100%; max-width: 960px; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        
        .grid-container { max-width: 960px; margin: 30px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .channel-card { background: #12172d; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .channel-card:hover { border-color: #0064ff; background: #1a2245; transform: translateY(-5px); }
        .tag { font-size: 0.7em; background: #0064ff; padding: 3px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #040714; display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #1a2245; z-index: 1000;
        }
        .nav-item { color: #a9a9a9; text-decoration: none; font-size: 0.75em; text-align: center; flex: 1; }
        .nav-item.active { color: #0064ff; }
        .nav-icon { font-size: 1.5em; display: block; margin-bottom: 4px; }

        /* TV MODE HIDING */
        @media (min-width: 1025px) {
            .bottom-nav { display: none; }
            body { padding-bottom: 20px; }
        }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <h1>str<span>▶eam</span></h1>
        <p>Premium Global Broadcasting</p>
    </div>

    <div class="player-wrapper">
        <video id="mainPlayer" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div class="grid-container" id="channelGrid"></div>

    <nav class="bottom-nav" id="bottomNav">
        <a href="index.html" class="nav-item"> <span class="nav-icon">🏠</span> Home </a>
        <a href="live-tv.html" class="nav-item active"> <span class="nav-icon">📺</span> Live TV </a>
        <a href="#" class="nav-item" id="downloadTab"> <span class="nav-icon">📥</span> Downloads </a>
        <a href="#" class="nav-item"> <span class="nav-icon">👤</span> Profile </a>
    </nav>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('mainPlayer');

        // UPDATED SECURE LINKS
        const channels = [
            { name: "Al Jazeera", url: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8", type: "News" },
            { name: "FIFA Plus", url: "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8", type: "Sports" },
            { name: "NASA TV", url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8", type: "Science" },
            { name: "Red Bull TV", url: "https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8", type: "Extreme" },
            { name: "Sky News", url: "https://skynews-skynews-main-1-gb.samsung.wurl.com/manifest/playlist.m3u8", type: "News" }
        ];

        function switchChannel(link) {
            player.src({ src: link, type: 'application/x-mpegURL' });
            player.play();
            if (window.innerWidth < 1024) window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        const grid = document.getElementById('channelGrid');
        channels.forEach(ch => {
            let card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `<span class="tag">${ch.type}</span><h3>${ch.name}</h3>`;
            card.onclick = () => switchChannel(ch.url);
            grid.appendChild(card);
        });

        // HIDE DOWNLOADS IF NOT PWA
        const isPWA = window.matchMedia('(display-mode: standalone)').matches;
        if (!isPWA) {
            document.getElementById('downloadTab').style.display = 'none';
        }

        switchChannel(channels[0].url);
    </script>
</body>
</html>
