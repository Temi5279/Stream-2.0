<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV | str▶eam</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #040714; color: white; margin: 0; padding: 0; font-family: sans-serif; }
        .video-container { width: 100%; background: #000; aspect-ratio: 16/9; position: relative; }
        video { width: 100%; height: 100%; }
        .channel-list { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .channel-card { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            cursor: pointer;
            border: 1px solid transparent;
        }
        .channel-card:hover { border-color: #0064ff; background: rgba(0,100,255,0.1); }
        .channel-card.active { border-color: #0064ff; background: #0064ff; }
        .navbar { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">str<span>▶</span>eam 📡 Live</div>
    </nav>

    <div class="video-container">
        <video id="video" controls autoplay></video>
    </div>

    <div style="padding: 20px;">
        <h2 id="currentChannel">Select a Channel</h2>
    </div>

    <div class="channel-list">
        <div class="channel-card" onclick="playStream('https://ntvpublic.akamaized.net/hls/live/2026549/NTV-Public/master.m3u8', 'NASA Public TV')">
            <span>🚀 NASA TV</span>
        </div>
        <div class="channel-card" onclick="playStream('https://nhkwlive-ojp.akamaized.net/hls/live/2000394/nhkwlive-ojp-en/index.m3u8', 'NHK World News')">
            <span>🌏 NHK News</span>
        </div>
        <div class="channel-card" onclick="playStream('https://static.france24.com/live/F24_EN_LO_HLS/live_tv.m3u8', 'France 24')">
            <span>🇫🇷 France 24</span>
        </div>
        <div class="channel-card" onclick="playStream('https://live-hls-web-aje.akamaized.net/hls/live/2036571/aje/index.m3u8', 'Al Jazeera English')">
            <span>📰 Al Jazeera</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const channelTitle = document.getElementById('currentChannel');

        function playStream(url, name) {
            channelTitle.innerText = "Playing: " + name;
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // For Safari/iOS which supports HLS natively
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // Play the first channel by default
        window.onload = () => {
            playStream('https://ntvpublic.akamaized.net/hls/live/2026549/NTV-Public/master.m3u8', 'NASA Public TV');
        };
    </script>
</body>
              </html>
