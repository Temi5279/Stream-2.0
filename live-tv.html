<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Live TV</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --card-bg: #12172d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 0; padding-bottom: 90px; }

        /* --- SMART NAVIGATION (Centered for TV) --- */
        .nav-container { background: var(--bg-dark); z-index: 1000; border-bottom: 1px solid #1a2245; width: 100%; display: flex; justify-content: center; }
        
        @media (min-width: 1024px) {
            .nav-container { position: sticky; top: 0; padding: 20px 0; }
            .nav-items { display: flex; gap: 50px; }
            .nav-link { font-size: 1.2em; }
            /* TV BRANDING LOGO BOTTOM RIGHT */
            .tv-logo { position: fixed; bottom: 30px; right: 40px; font-size: 2.2em; color: var(--brand-blue); font-weight: bold; opacity: 0.8; z-index: 100; pointer-events: none; }
            body { padding-bottom: 20px; }
        }

        @media (max-width: 1023px) {
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 0; border-top: 1px solid #1a2245; border-bottom: none; }
            .nav-items { width: 100%; display: flex; justify-content: space-around; }
            .nav-link { font-size: 0.8em; text-align: center; }
            .tv-logo { display: none; }
        }

        .nav-link { color: #a9a9a9; text-decoration: none; transition: 0.3s; cursor: pointer; }
        .nav-link.active { color: var(--brand-blue); font-weight: bold; }

        /* PLAYER & SEARCH */
        .player-wrapper { width: 100%; max-width: 900px; margin: 20px auto; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        
        .search-area { max-width: 900px; margin: 0 auto; padding: 0 20px; text-align: center; }
        .search-input { width: 100%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: var(--card-bg); color: white; margin-bottom: 15px; }

        /* CHANNEL GRID */
        .grid-container { max-width: 900px; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 0 20px; }
        .channel-card { background: var(--card-bg); padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .channel-card:hover { border-color: var(--brand-blue); transform: translateY(-5px); }
        .channel-card strong { display: block; font-size: 0.9em; }
        .channel-card span { font-size: 0.7em; color: var(--brand-blue); text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="tv-logo">str▶eam</div>

    <nav class="nav-container">
        <div class="nav-items">
            <a href="stream-home.html" class="nav-link">Home</a>
            <a href="live-tv.html" class="nav-link active">Live TV</a>
            <a href="discover.html" class="nav-link">Discover</a>
            <a href="#" class="nav-link" id="dlTab">Downloads</a>
            <a href="profile.html" class="nav-link">Profile</a>
        </div>
    </nav>

    <div class="player-wrapper">
        <video id="tvPlayer" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div class="search-area">
        <input type="text" id="channelSearch" class="search-input" placeholder="Search Channels (News, Sports, Kids)...">
    </div>

    <div class="grid-container" id="grid"></div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('tvPlayer');

        // FIXED & VERIFIED CHANNELS (2026 Updated)
        const channels = [
            { name: "FIFA Plus", url: "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8", cat: "Sports" },
            { name: "Red Bull TV", url: "https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8", cat: "Sports" },
            { name: "Al Jazeera", url: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8", cat: "News" },
            { name: "ABC News", url: "https://abcnews-live-us-east-1.fastly.net/master.m3u8", cat: "News" },
            { name: "Sky News", url: "https://skynews-skynews-main-1-gb.samsung.wurl.com/manifest/playlist.m3u8", cat: "News" },
            { name: "NASA Public", url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master.m3u8", cat: "Science" },
            { name: "Bloomberg TV", url: "https://liveproduction6.akamaized.net/hls/live/2042780/bloomberg_us/master.m3u8", cat: "Finance" },
            { name: "Rakuten Action", url: "https://rakuten-actionmovies-1-nl.samsung.wurl.com/manifest/playlist.m3u8", cat: "Movies" },
            { name: "Lego Channel", url: "https://vcp-v-eu-west-1.vcp.samsung.com/159/manifest/playlist.m3u8", cat: "Kids" }
        ];

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            list.forEach(ch => {
                let card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `<strong>${ch.name}</strong><span>${ch.cat}</span>`;
                card.onclick = () => {
                    player.src({ src: ch.url, type: 'application/x-mpegURL' });
                    player.play();
                    if(window.innerWidth < 1024) window.scrollTo({top: 0, behavior: 'smooth'});
                };
                grid.appendChild(card);
            });
        }

        document.getElementById('channelSearch').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = channels.filter(ch => ch.name.toLowerCase().includes(val) || ch.cat.toLowerCase().includes(val));
            render(filtered);
        };

        // PWA Detection for Downloads
        const isApp = window.matchMedia('(display-mode: standalone)').matches || navigator.userAgent.toLowerCase().includes("smart-tv");
        if (!isApp) document.getElementById('dlTab').style.display = 'none';

        render(channels);
        player.src({ src: channels[0].url, type: 'application/x-mpegURL' });
    </script>
</body>
</html>
