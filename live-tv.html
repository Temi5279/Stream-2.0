<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Global Live TV</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#040714">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #040714; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 2.5em; letter-spacing: -1px; }
        .header h1 span { color: #0064ff; }
        
        /* Premium Player Container */
        .player-wrapper { width: 100%; max-width: 960px; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        
        /* Netflix-style Control Customization */
        .vjs-theme-netflix .vjs-big-play-button { background-color: #0064ff; border-radius: 50%; }
        .vjs-play-progress { background-color: #0064ff !important; }

        /* Channel Selection Grid */
        .grid-container { max-width: 960px; margin: 30px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .channel-card { background: #12172d; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .channel-card:hover { border-color: #0064ff; background: #1a2245; transform: translateY(-5px); }
        .channel-card h3 { margin: 10px 0 5px 0; font-size: 1.1em; }
        .tag { font-size: 0.7em; background: #0064ff; padding: 3px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h1>str<span>▶eam</span></h1>
        <p>Premium Global Broadcasting</p>
    </div>

    <div class="player-wrapper">
        <video id="mainPlayer" class="video-js vjs-big-play-centered vjs-theme-netflix" controls preload="auto">
            <p class="vjs-no-js">Enable JavaScript to experience str▶eam.</p>
        </video>
    </div>

    <div class="grid-container" id="channelGrid">
        </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        // 1. PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // 2. Setup Player
        var player = videojs('mainPlayer');

        // 3. Updated Channel List with your provided links
        const channels = [
            { 
                name: "Al Jazeera", 
                url: "https://live-hls-web-aje.getaj.net/AJE/index.m3u8", 
                type: "News" 
            },
            { 
                name: "FIFA Plus", 
                url: "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8", 
                type: "Sports" 
            },
            { 
                name: "NASA TV Public", 
                url: "https://ntv1.akamaized.net/hls/live/2014075/NASA-NTV1-HLS/master_2000.m3u8", 
                type: "Science" 
            },
            { 
                name: "NASA Media", 
                url: "https://nasa-i.akamaihd.net/hls/live/253566/NASA-NTV2-Media/master.m3u8", 
                type: "Science" 
            },
            { 
                name: "ISS Live Earth", 
                url: "http://d2ai41bknpka2u.cloudfront.net/live/iss.stream_source/chunklist.m3u8", 
                type: "Live Space" 
            },
            { 
                name: "Red Bull TV", 
                url: "https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8", 
                type: "Extreme Sports" 
            }
        ];

        // 4. Function to change channel
        function switchChannel(link) {
            player.src({
                src: link,
                type: 'application/x-mpegURL'
            });
            player.play();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 5. Build the UI
        const grid = document.getElementById('channelGrid');
        channels.forEach(ch => {
            let card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `<span class="tag">${ch.type}</span><h3>${ch.name}</h3>`;
            card.onclick = () => switchChannel(ch.url);
            grid.appendChild(card);
        });

        // Start with Al Jazeera by default
        switchChannel(channels[0].url);
    </script>
</body>
</html>
