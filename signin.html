<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Sign In / Sign Up</title>
    
    <!-- Link to your CSS file (only once is enough) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body>
    <header>
        <div class="logo">str▶eam</div>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <div class="auth-container">
        <h2 id="formTitle">Sign In to str▶eam</h2>
        
        <input type="email" id="email" placeholder="Email address" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <button id="authBtn">Sign In</button>
        
        <p id="toggleText">
            New to str▶eam? 
            <span id="toggleLink" style="color:#E50914; cursor:pointer; text-decoration:underline;">Sign Up Now</span>
        </p>
        
        <p id="message" style="color:#ff6b6b; margin-top:15px; min-height:20px;"></p>
    </div>

    <script>
        // Your Firebase config
        const firebaseConfig = {
          apiKey: "AIzaSyBfkqkhk0z8xuritMgzf4Bhf_N2Na-Co-Y",
          authDomain: "stream-2o.firebaseapp.com",
          projectId: "stream-2o",
          storageBucket: "stream-2o.firebasestorage.app",
          messagingSenderId: "6845983758",
          appId: "1:6845983758:web:f0016e044e8aadb192e05f",
          measurementId: "G-EZSCM2ZX7W"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let isLogin = true;   // true = Sign In, false = Sign Up

        // Toggle between Sign In and Sign Up
        document.getElementById('toggleLink').addEventListener('click', () => {
            isLogin = !isLogin;
            
            if (isLogin) {
                document.getElementById('formTitle').textContent = "Sign In to str▶eam";
                document.getElementById('authBtn').textContent = "Sign In";
                document.getElementById('toggleText').innerHTML = `New to str▶eam? <span id="toggleLink" style="color:#E50914; cursor:pointer; text-decoration:underline;">Sign Up Now</span>`;
            } else {
                document.getElementById('formTitle').textContent = "Create your str▶eam account";
                document.getElementById('authBtn').textContent = "Sign Up";
                document.getElementById('toggleText').innerHTML = `Already have an account? <span id="toggleLink" style="color:#E50914; cursor:pointer; text-decoration:underline;">Sign In</span>`;
            }
        });

        // Handle Sign In / Sign Up
        document.getElementById('authBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const messageEl = document.getElementById('message');

            messageEl.textContent = '';

            if (!email || !password) {
                messageEl.textContent = "Please enter email and password";
                return;
            }

            if (password.length < 6) {
                messageEl.textContent = "Password must be at least 6 characters";
                return;
            }

            if (isLogin) {
                // Sign In
                auth.signInWithEmailAndPassword(email, password)
                    .then(() => {
                        window.location.href = "index.html";
                    })
                    .catch((error) => {
                        messageEl.textContent = error.message;
                    });
            } else {
                // Sign Up
                auth.createUserWithEmailAndPassword(email, password)
                    .then(() => {
                        messageEl.style.color = "#4ade80";
                        messageEl.textContent = "Account created successfully! Redirecting...";
                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    })
                    .catch((error) => {
                        messageEl.textContent = error.message;
                    });
            }
        });
    </script>
</body>
</html>
