<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | str▶eam</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #040714;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #31343e;
            border: none;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo" style="margin-bottom: 20px; font-size: 2.5rem;">str<span>▶</span>eam</div>
        <h2 style="color: white; margin-bottom: 20px;">Sign In</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPass" placeholder="Password" required>
            <button type="submit" class="btn-select">Sign In</button>
        </form>
        <p style="color: #888; margin-top: 20px;">
            New to str▶eam? <a href="index.html" style="color: white; text-decoration: none;">Choose a Plan</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Use your Firebase Config here
        const firebaseConfig = {
            apiKey: "AIzaSyBfkqkhk0z8xuritMgzf4Bhf_N2Na-Co-Y",
            authDomain: "stream-2o.firebaseapp.com",
            projectId: "stream-2o",
            storageBucket: "stream-2o.firebasestorage.app",
            messagingSenderId: "6845983758",
            appId: "1:6845983758:web:f0016e044e8aadb192e05f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = 'stream-home.html';
            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>
</body>
</html>
