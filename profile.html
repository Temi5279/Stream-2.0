<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Profile</title>
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; text-align: center; }

        /* UNIFIED NAV CODE */
        .nav-container { background: rgba(4, 7, 20, 0.8); backdrop-filter: blur(20px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        @media (min-width: 600px) { .nav-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: fit-content; border-radius: 50px; padding: 10px 40px; display: flex; gap: 30px; } }
        @media (max-width: 599px) { .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 12px 0; border-radius: 20px 20px 0 0; } body { padding-bottom: 80px; } }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; padding: 5px 15px; border-radius: 20px; }
        .nav-link.active { color: var(--brand-blue); font-weight: bold; }
        :focus { outline: none; border: 3px solid var(--brand-blue) !important; transform: scale(1.05); }

        .profile-card { max-width: 400px; margin: 100px auto; padding: 30px; background: var(--glass); border-radius: 20px; backdrop-filter: blur(10px); }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--brand-blue); margin-bottom: 20px; }
        .btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: var(--brand-blue); color: white; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="nav-container">
        <a href="index.html" class="nav-link" tabindex="1">Home</a>
        <a href="live-tv.html" class="nav-link" tabindex="2">Live TV</a>
        <a href="discover.html" class="nav-link" tabindex="3">Discover</a>
        <a href="profile.html" class="nav-link active" tabindex="4">Profile</a>
    </nav>

    <div class="profile-card">
        <div class="avatar" style="background: #222; margin: 0 auto 20px;"></div>
        <h2 id="uName">Cardi-b</h2>
        <input type="text" id="nameIn" placeholder="New Name" style="width:90%; padding:10px; border-radius:5px; margin-bottom:10px;" tabindex="5">
        <button class="btn" tabindex="6">Update Name</button>
        <button class="btn" style="background:#ff4444;" tabindex="7">Logout</button>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            const items = Array.from(document.querySelectorAll('[tabindex]'));
            let current = items.indexOf(document.activeElement);
            if (e.key === "ArrowRight") current = (current + 1) % items.length;
            if (e.key === "ArrowLeft") current = (current - 1 + items.length) % items.length;
            if (e.key === "ArrowDown") current = (current + 1) % items.length;
            if (e.key === "ArrowUp") current = (current - 1 + items.length) % items.length;
            items[current]?.focus();
        });
    </script>
</body>
</html>
