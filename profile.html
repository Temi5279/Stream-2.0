<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Profile</title>
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; text-align: center; }
        :focus { border: 3px solid var(--brand-blue) !important; transform: scale(1.05); }

        .profile-container { max-width: 500px; margin: 80px auto; padding: 40px; background: var(--glass); border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--brand-blue); margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px; border: none; background: var(--brand-blue); color: white; font-weight: bold; cursor: pointer; }

        /* CONSISTENT NAV */
        .nav-container { background: rgba(4, 7, 20, 0.7); backdrop-filter: blur(20px); position: sticky; top: 20px; width: fit-content; margin: 0 auto; border-radius: 50px; padding: 12px 40px; display: flex; gap: 40px; }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; border-radius: 10px; padding: 5px; }
        .nav-link.active { color: var(--brand-blue); }
    </style>
</head>
<body>
    <nav class="nav-container">
        <a href="stream-home.html" class="nav-link">Home</a>
        <a href="live-tv.html" class="nav-link">Live TV</a>
        <a href="discover.html" class="nav-link">Discover</a>
        <a href="profile.html" class="nav-link active">Profile</a>
    </nav>

    <div class="profile-container">
        <img src="https://via.placeholder.com/150" class="avatar" id="userPic">
        <h2 id="userName">User Name</h2>
        <input type="text" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; background:#000; color:#fff;" id="nameInput" tabindex="1">
        <button class="btn" tabindex="2">Update Name</button>
        <button class="btn" style="background:#ff4444;" tabindex="3">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfkqkhk0z8xuritMgzf4Bhf_N2Na-Co-Y",
            authDomain: "stream-2o.firebaseapp.com",
            projectId: "stream-2o",
            storageBucket: "stream-2o.firebasestorage.app",
            messagingSenderId: "6845983758",
            appId: "1:6845983758:web:f0016e044e8aadb192e05f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userName').innerText = user.displayName || "Streamer";
                if(user.photoURL) document.getElementById('userPic').src = user.photoURL;
            }
        });
    </script>
</body>
</html>
