<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Galaxy | str▶eam</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(4, 7, 20, 0.85), rgba(4, 7, 20, 0.95)), 
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .benefits-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .benefit-list { text-align: left; margin: 30px 0; }
        .benefit-item { display: flex; align-items: center; margin-bottom: 15px; font-size: 1rem; }
        .benefit-item i { color: #0064ff; margin-right: 15px; font-size: 1.2rem; }
        
        .btn-action {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .btn-primary { background: #0064ff; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="benefits-card">
        <div class="logo">str<span>▶</span>eam</div>
        <h2 style="margin-top: 20px;">Ready to start watching?</h2>
        <p style="color: #aaa;">Join the millions streaming the best movies, live TV, and originals.</p>

        <div class="benefit-list">
            <div class="benefit-item"><i class="fas fa-check-circle"></i> Unlimited Movies & Series</div>
            <div class="benefit-item"><i class="fas fa-check-circle"></i> Live Global TV Channels</div>
            <div class="benefit-item"><i class="fas fa-check-circle"></i> Stream on up to 10 devices</div>
            <div class="benefit-item"><i class="fas fa-check-circle"></i> 4K Ultra HD & Download for offline</div>
        </div>

        <a href="index.html#plans" class="btn-action btn-primary">CHOOSE A PLAN</a>
        <a href="signin.html" class="btn-action btn-secondary">ALREADY A MEMBER? SIGN IN</a>
    </div>

</body>
</html>
