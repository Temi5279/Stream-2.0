<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Discover</title>
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; text-align: center; }
        
        /* UNIFIED NAV CODE (SAME AS ABOVE) */
        .nav-container { background: rgba(4, 7, 20, 0.8); backdrop-filter: blur(20px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        @media (min-width: 600px) { .nav-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: fit-content; border-radius: 50px; padding: 10px 40px; display: flex; gap: 30px; } }
        @media (max-width: 599px) { .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 12px 0; border-radius: 20px 20px 0 0; } body { padding-bottom: 80px; } }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; padding: 5px 15px; border-radius: 20px; }
        .nav-link.active { color: var(--brand-blue); font-weight: bold; }
        :focus { outline: none; border: 3px solid var(--brand-blue) !important; transform: scale(1.05); background: rgba(0, 100, 255, 0.1); }

        .search-box { width: 85%; max-width: 600px; padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); background: var(--glass); color: white; font-size: 1.1em; margin-top: 100px; }
        .genre-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; padding: 30px; }
        .genre-card { height: 90px; border-radius: 12px; background: linear-gradient(45deg, #12172d, #0064ff); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <nav class="nav-container">
        <a href="index.html" class="nav-link" tabindex="1">Home</a>
        <a href="live-tv.html" class="nav-link" tabindex="2">Live TV</a>
        <a href="discover.html" class="nav-link active" tabindex="3">Discover</a>
        <a href="profile.html" class="nav-link" tabindex="4">Profile</a>
    </nav>

    <input type="text" class="search-box" placeholder="Search movies, actors..." tabindex="5">

    <div class="genre-grid">
        <div class="genre-card" tabindex="6">ACTION</div>
        <div class="genre-card" tabindex="7">HORROR</div>
        <div class="genre-card" tabindex="8">COMEDY</div>
        <div class="genre-card" tabindex="9">SCI-FI</div>
    </div>

    <script>
        document.addEventListener('keydown', (e) => {
            const items = Array.from(document.querySelectorAll('[tabindex]'));
            let current = items.indexOf(document.activeElement);
            if (e.key === "ArrowRight") current = (current + 1) % items.length;
            if (e.key === "ArrowLeft") current = (current - 1 + items.length) % items.length;
            if (e.key === "ArrowDown") current = (current + 2) % items.length;
            if (e.key === "ArrowUp") current = (current - 2 + items.length) % items.length;
            items[current]?.focus();
        });
    </script>
</body>
</html>
