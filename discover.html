    <style>
        /* CSS REMAINS THE SAME AS LIVE TV ABOVE FOR CONSISTENT NAV */
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.15); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow-x: hidden; }
        :focus { outline: none; border: 3px solid var(--brand-blue) !important; transform: scale(1.1); box-shadow: 0 0 25px var(--brand-blue); z-index: 10; background: rgba(0, 100, 255, 0.2); }
        .nav-container { background: rgba(4, 7, 20, 0.7); backdrop-filter: blur(20px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        @media (min-width: 600px) {
            .nav-container { position: sticky; top: 20px; width: fit-content; margin: 0 auto; border-radius: 50px; padding: 12px 40px; display: flex; gap: 40px; }
            .tv-logo { position: fixed; bottom: 40px; right: 50px; font-size: 2.5em; color: var(--brand-blue); font-weight: bold; }
        }
        @media (max-width: 599px) {
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; }
            body { padding-bottom: 80px; }
        }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; border-radius: 10px; padding: 5px; }
        .nav-link.active { color: var(--brand-blue); text-shadow: 0 0 10px var(--brand-blue); }
        .icon { width: 24px; height: 24px; fill: currentColor; }

        /* DISCOVER CONTENT */
        .search-bar { width: 80%; margin: 40px auto; padding: 15px 30px; border-radius: 50px; border: 1px solid var(--glass); background: var(--glass); color: white; font-size: 1.2em; display: block; }
        .genre-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 0 60px; }
        .genre-box { height: 100px; background: linear-gradient(45deg, #1a1f35, var(--brand-blue)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
    </style>
