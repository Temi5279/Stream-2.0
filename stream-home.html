    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.15); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow-x: hidden; }

        /* REMOTE FOCUS STYLE */
        :focus { outline: none; border: 3px solid var(--brand-blue) !important; transform: scale(1.1); box-shadow: 0 0 25px var(--brand-blue); z-index: 10; background: rgba(0, 100, 255, 0.2); }

        /* NAV BAR */
        .nav-container { background: rgba(4, 7, 20, 0.7); backdrop-filter: blur(20px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        @media (min-width: 600px) { /* Force TV mode on landscape phone */
            .nav-container { position: sticky; top: 20px; width: fit-content; margin: 0 auto; border-radius: 50px; padding: 12px 40px; display: flex; gap: 40px; }
            .tv-logo { position: fixed; bottom: 40px; right: 50px; font-size: 2.5em; color: var(--brand-blue); font-weight: bold; }
        }
        @media (max-width: 599px) {
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; }
            body { padding-bottom: 80px; }
        }
        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; border-radius: 10px; padding: 5px; }
        .nav-link.active { color: var(--brand-blue); text-shadow: 0 0 10px var(--brand-blue); }
        .icon { width: 24px; height: 24px; fill: currentColor; }

        /* HERO */
        .hero { height: 80vh; display: flex; align-items: flex-end; padding: 60px; background: linear-gradient(to top, var(--bg-dark), transparent), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1450&auto=format&fit=crop'); background-size: cover; }
        .btn-play { background: white; color: black; padding: 15px 45px; border: none; border-radius: 5px; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-right: 15px; }
        
        /* MOVIE GRID */
        .row-title { padding-left: 60px; font-size: 1.5em; margin-top: 30px; }
        .movie-row { display: flex; gap: 20px; padding: 20px 60px; overflow-x: auto; scrollbar-width: none; }
        .movie-card { min-width: 250px; height: 140px; background: var(--glass); border-radius: 10px; background-size: cover; cursor: pointer; transition: 0.3s; }
    </style>

    <div class="hero">
        <div class="hero-content">
            <h1 style="font-size: 5em; margin: 0;">GHOST TRAIN</h1>
            <button class="btn-play" tabindex="5">▶ Play</button>
            <button class="btn-play" style="background:rgba(255,255,255,0.2); color:white;" tabindex="6">+ My List</button>
        </div>
    </div>

    <h2 class="row-title">Public Domain Classics</h2>
    <div class="movie-row" id="movieList"></div>

    <script type="module">
        // REMOTE NAVIGATION LOGIC
        document.addEventListener('keydown', (e) => {
            const focusable = Array.from(document.querySelectorAll('a, button, .movie-card'));
            let index = focusable.indexOf(document.activeElement);
            if (e.key === "ArrowRight") index = (index + 1) % focusable.length;
            if (e.key === "ArrowLeft") index = (index - 1 + focusable.length) % focusable.length;
            if (e.key === "ArrowDown" || e.key === "ArrowUp") index = (index + 4) % focusable.length; // Jump rows
            if (e.key === "Enter") document.activeElement.click();
            focusable[index]?.focus();
        });

        const movies = [
            { title: "Night of the Living Dead", img: "https://publicdomainmovie.net/movie.php?id=night_of_the_living_dead&type=.jpg" },
            { title: "Charade", img: "https://publicdomainmovie.net/movie.php?id=charade&type=.jpg" },
            { title: "The Fast and the Furious (1954)", img: "https://publicdomainmovie.net/movie.php?id=the_fast_and_the_furious&type=.jpg" }
        ];

        const row = document.getElementById('movieList');
        movies.forEach((m, i) => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.tabIndex = 10 + i;
            card.style.backgroundImage = `url(${m.img})`;
            row.appendChild(card);
        });
    </script>
</body>
