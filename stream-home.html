<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | str▶eam</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* App-Specific Styling */
        body { padding-bottom: 90px; }

        .featured-hero {
            height: 75vh;
            background: linear-gradient(to top, var(--disney-dark), transparent), 
                        url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 5%;
        }

        .movie-row { padding: 20px 0 20px 5%; }
        .movie-row h2 { font-size: 1.1rem; margin-bottom: 15px; color: #888; letter-spacing: 1px; }
        
        .card-container {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-right: 5%;
            scrollbar-width: none; 
        }
        .card-container::-webkit-scrollbar { display: none; }

        .movie-card {
            min-width: 160px;
            height: 240px;
            background: #1a1d29;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            background-size: cover;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .movie-card:hover { transform: scale(1.05); border: 2px solid rgba(255,255,255,0.8); z-index: 10; }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: rgba(4, 7, 20, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 2000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            text-decoration: none;
            font-size: 0.65rem;
            transition: 0.3s;
            font-weight: bold;
        }

        .nav-item i { font-size: 1.3rem; margin-bottom: 5px; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <section class="featured-hero">
        <div class="logo" style="margin-bottom: 10px; font-size: 1.2rem;">str<span>▶</span>eam Original</div>
        <h1 style="font-size: 3.5rem; margin: 0; font-weight: 900;">GALACTIC VOYAGE</h1>
        <p style="max-width: 550px; color: #ccc; line-height: 1.5;">Experience the journey that redefined the stars. Available now in 4K Ultra HD and Dolby Atmos.</p>
        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <button class="btn-select" style="width: 160px; margin:0;">
                <i class="fas fa-play"></i> PLAY
            </button>
            <button class="btn-select" style="width: 60px; background: rgba(255,255,255,0.1); margin:0; border: 1px solid white;">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </section>

    <div class="movie-row">
        <h2>RECOMMENDED FOR YOU</h2>
        <div class="card-container">
            <div class="movie-card" style="background-image: url('https://via.placeholder.com/160x240/111?text=Movie+1')"></div>
            <div class="movie-card" style="background-image: url('https://via.placeholder.com/160x240/222?text=Movie+2')"></div>
            <div class="movie-card" style="background-image: url('https://via.placeholder.com/160x240/333?text=Movie+3')"></div>
            <div class="movie-card" style="background-image: url('https://via.placeholder.com/160x240/444?text=Movie+4')"></div>
            <div class="movie-card" style="background-image: url('https://via.placeholder.com/160x240/555?text=Movie+5')"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="stream-home.html" class="nav-item active">
            <i class="fas fa-house"></i>
            <span>HOME</span>
        </a>
        <a href="live-tv.html" class="nav-item">
            <i class="fas fa-tv"></i>
            <span>LIVE TV</span>
        </a>
        <a href="discover.html" class="nav-item">
            <i class="fas fa-compass"></i>
            <span>DISCOVER</span>
        </a>
        <a href="downloads.html" class="nav-item">
            <i class="fas fa-arrow-down"></i>
            <span>DOWNLOADS</span>
        </a>
        <a href="my-stream.html" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span>MY STREAM</span>
        </a>
    </nav>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // This check runs immediately when the page loads
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Not logged in? Redirect to the benefits/protection page
                window.location.href = 'join-stream.html';
            } else {
                console.log("Access Granted for:", user.email);
            }
        });
    </script>
</body>
  </html>
