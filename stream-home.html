<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>str▶eam - Home</title>

    <link rel="manifest" href="manifest.json">

    <style>

        :root { --brand-blue: #0064ff; --bg-dark: #040714; --card-bg: #12172d; }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 0; padding-bottom: 90px; overflow-x: hidden; }

        

        /* THE SMART NAVIGATION SYSTEM */

        .nav-container { background: var(--bg-dark); z-index: 1000; border-bottom: 1px solid #1a2245; transition: 0.3s; }

        

        /* Desktop/TV Mode: Nav at the TOP */

        @media (min-width: 1024px) {

            .nav-container { position: sticky; top: 0; display: flex; align-items: center; justify-content: space-between; padding: 15px 60px; }

            .nav-items { display: flex; gap: 40px; }

            body { padding-bottom: 0; }

            .logo { font-size: 2em; color: var(--brand-blue); font-weight: bold; text-decoration: none; }

            .logo-mobile-top { display: none; }

        }



        /* Mobile Mode: Nav at the BOTTOM */

        @media (max-width: 1023px) {

            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a2245; border-bottom: none; }

            .logo { display: none; } 

            .logo-mobile-top { display: block; text-align: center; padding: 20px 0; font-size: 2.2em; color: var(--brand-blue); font-weight: bold; }

            .nav-items { display: flex; width: 100%; justify-content: space-around; }

        }



        .nav-link { color: #a9a9a9; text-decoration: none; font-size: 1em; transition: 0.3s; cursor: pointer; }

        .nav-link.active { color: var(--brand-blue); font-weight: bold; }

        .nav-link:hover { color: white; }



        /* Hero Section (Netflix Style) */

        .hero { 

            position: relative; height: 80vh; width: 100%; 

            background: linear-gradient(to top, var(--bg-dark), transparent), url('hero-bg.jpg'); 

            background-size: cover; background-position: center;

            display: flex; align-items: flex-end; padding: 60px;

        }

        .hero-content { max-width: 700px; z-index: 2; }

        .hero-title { font-size: 4em; margin: 0; color: white; font-weight: 800; text-transform: uppercase; }

        .hero-desc { font-size: 1.2em; color: #ccc; margin: 20px 0; line-height: 1.5; }

        

        .btn-group { display: flex; gap: 15px; }

        .btn { padding: 12px 35px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1em; display: flex; align-items: center; gap: 10px; }

        .btn-play { background: white; color: black; }

        .btn-list { background: rgba(109, 109, 110, 0.7); color: white; }



        /* Rows */

        .row-title { padding: 30px 60px 10px; font-size: 1.5em; font-weight: 600; }

        .movie-row { display: flex; overflow-x: auto; gap: 15px; padding: 10px 60px 40px; scrollbar-width: none; }

        .movie-row::-webkit-scrollbar { display: none; }

        .card { min-width: 220px; height: 125px; background: var(--card-bg); border-radius: 4px; transition: 0.4s; cursor: pointer; background-size: cover; }

        .card:hover { transform: scale(1.1); z-index: 5; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 1px solid var(--brand-blue); }

    </style>

</head>

<body>



    <div class="logo-mobile-top">str▶eam</div>



    <nav class="nav-container">

        <a href="stream-home.html" class="logo">str▶eam</a>

        <div class="nav-items">

            <a href="stream-home.html" class="nav-link active">Home</a>

            <a href="live-tv.html" class="nav-link">Live TV</a>

            <a href="discover.html" class="nav-link">Discover</a>

            <a href="#" class="nav-link" id="dlLink">Downloads</a>

            <a href="profile.html" class="nav-link">Profile</a>

        </div>

    </nav>



    <section class="hero">

        <div class="hero-content">

            <h1 class="hero-title">Galactic Voyage</h1>

            <p class="hero-desc">An epic journey beyond the stars. Explore the unknown in this str▶eam original masterpiece.</p>

            <div class="btn-group">

                <button class="btn btn-play"><span>▶</span> Play</button>

                <button class="btn btn-list"><span>+</span> My List</button>

            </div>

        </div>

    </section>



    <h2 class="row-title">Trending Now</h2>

    <div class="movie-row">

        <div class="card" style="background-image: url('thumb1.jpg');"></div>

        <div class="card" style="background-image: url('thumb2.jpg');"></div>

        <div class="card" style="background-image: url('thumb3.jpg');"></div>

        <div class="card" style="background-image: url('thumb4.jpg');"></div>

        <div class="card" style="background-image: url('thumb5.jpg');"></div>

    </div>



    <script>

        // PWA & TV Logic

        const isPWA = window.matchMedia('(display-mode: standalone)').matches;

        const isTV = navigator.userAgent.toLowerCase().includes("smart-tv") || navigator.userAgent.toLowerCase().includes("androidtv");



        // Hide Downloads link if not in the proper environment

        if (!isPWA && !isTV) {

            const dl = document.getElementById('dlLink');

            if(dl) dl.style.display = 'none';

        }

    </script>

</body>

                    </html>
