<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Premium Home</title>
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; overflow-x: hidden; }

        /* LIQUID GLASS ANIMATION */
        @keyframes liquidSlide {
            0% { transform: translateY(10px); opacity: 0; filter: blur(5px); }
            100% { transform: translateY(0); opacity: 1; filter: blur(0); }
        }

        /* NAVIGATION CONTAINER */
        .nav-container { 
            background: rgba(4, 7, 20, 0.8); 
            backdrop-filter: blur(15px); 
            z-index: 1000; 
            border: 1px solid rgba(255,255,255,0.1);
            animation: liquidSlide 0.8s ease-out;
        }

        /* TV & LAPTOP: Centered & Spaced */
        @media (min-width: 1024px) {
            .nav-container { position: sticky; top: 20px; width: 60%; margin: 0 auto; border-radius: 50px; padding: 15px 0; display: flex; justify-content: center; }
            .nav-items { display: flex; gap: 60px; } /* High spacing for TV */
            .nav-link { font-size: 1.1em; letter-spacing: 1px; }
            .tv-logo { position: fixed; bottom: 40px; right: 50px; font-size: 2.5em; color: var(--brand-blue); font-weight: bold; }
            .logo-mobile-top { display: none; }
        }

        /* MOBILE: Bottom Glass Bar */
        @media (max-width: 1023px) {
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; }
            .nav-items { width: 100%; display: flex; justify-content: space-around; }
            .nav-link { font-size: 0.75em; display: flex; flex-direction: column; align-items: center; gap: 5px; }
            .logo-mobile-top { display: block; text-align: center; padding: 20px 0; font-size: 2.2em; color: var(--brand-blue); font-weight: bold; }
            .tv-logo { display: none; }
            body { padding-bottom: 80px; }
        }

        .nav-link { color: rgba(255,255,255,0.6); text-decoration: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .nav-link.active { color: var(--brand-blue); text-shadow: 0 0 15px var(--brand-blue); }
        .nav-link:hover { transform: scale(1.15); color: white; }

        /* MODERN ICONS (SVG Based) */
        .icon { width: 24px; height: 24px; fill: currentColor; }

        /* HERO SECTION */
        .hero { height: 85vh; display: flex; align-items: flex-end; padding: 60px; background: linear-gradient(to top, var(--bg-dark), transparent), url('hero-bg.jpg'); background-size: cover; }
        .btn-play { background: white; color: black; padding: 12px 40px; border: none; border-radius: 5px; font-weight: bold; font-size: 1.2em; cursor: pointer; }
    </style>
</head>

</body>
</html>
