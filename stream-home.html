<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Home</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --card-bg: #12172d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- THE SMART NAVIGATION --- */
        .nav-container { background: var(--bg-dark); z-index: 1000; border-bottom: 1px solid #1a2245; width: 100%; }
        .nav-items { display: flex; align-items: center; }
        .nav-link { color: #a9a9a9; text-decoration: none; transition: 0.3s; cursor: pointer; white-space: nowrap; }
        .nav-link.active { color: var(--brand-blue); font-weight: bold; }

        /* TV & LAPTOP (TOP NAV) */
        @media (min-width: 1024px) {
            .nav-container { position: sticky; top: 0; padding: 20px 0; display: flex; justify-content: center; }
            .nav-items { gap: 50px; } /* Spread them out in the center */
            .nav-link { font-size: 1.2em; }
            .logo-mobile-top { display: none; }
            /* LOGO AT BOTTOM RIGHT FOR TV */
            .tv-logo { position: fixed; bottom: 30px; right: 40px; font-size: 2.5em; color: var(--brand-blue); font-weight: bold; z-index: 100; opacity: 0.8; }
        }

        /* MOBILE & TABLET (BOTTOM NAV) */
        @media (max-width: 1023px) {
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #1a2245; border-bottom: none; }
            .nav-items { width: 100%; justify-content: space-around; }
            .nav-link { font-size: 0.85em; display: flex; flex-direction: column; align-items: center; }
            .nav-icon { font-size: 1.4em; margin-bottom: 2px; }
            .logo-mobile-top { display: block; text-align: center; padding: 15px 0; font-size: 2em; color: var(--brand-blue); font-weight: bold; }
            .tv-logo { display: none; }
            body { padding-bottom: 80px; }
        }

        /* --- HERO SECTION (MOBILE OPTIMIZED) --- */
        .hero { 
            position: relative; height: 85vh; width: 100%; 
            background: linear-gradient(to top, var(--bg-dark) 10%, transparent 90%), url('hero-bg.jpg'); 
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; justify-content: flex-start;
        }
        .hero-content { padding: 40px; max-width: 800px; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; color: white; font-weight: 800; text-transform: uppercase; line-height: 1; }
        .hero-desc { font-size: clamp(0.9rem, 3vw, 1.2rem); color: #ccc; margin: 15px 0; line-height: 1.4; max-width: 500px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { 
            padding: 10px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; 
            font-size: 1rem; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-play { background: white; color: black; }
        .btn-play:hover { background: #e6e6e6; }
        .btn-list { background: rgba(109, 109, 110, 0.7); color: white; }
    </style>
</head>
<body>

    <div class="logo-mobile-top">str▶eam</div>
    <div class="tv-logo">str▶eam</div>

    <nav class="nav-container">
        <div class="nav-items">
            <a href="stream-home.html" class="nav-link active"><span class="nav-icon">🏠</span><span>Home</span></a>
            <a href="live-tv.html" class="nav-link"><span class="nav-icon">📺</span><span>Live TV</span></a>
            <a href="discover.html" class="nav-link"><span class="nav-icon">🔍</span><span>Discover</span></a>
            <a href="#" class="nav-link" id="dlLink"><span class="nav-icon">📥</span><span>Downloads</span></a>
            <a href="profile.html" class="nav-link"><span class="nav-icon">👤</span><span>Profile</span></a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Galactic Voyage</h1>
            <p class="hero-desc">An epic journey beyond the stars. Explore the unknown in this str▶eam original masterpiece.</p>
            <div class="btn-group">
                <button class="btn btn-play">▶ Play</button>
                <button class="btn btn-list">+ My List</button>
            </div>
        </div>
    </section>

    <script>
        // Check for PWA and TV
        const isPWA = window.matchMedia('(display-mode: standalone)').matches;
        const isTV = navigator.userAgent.toLowerCase().includes("smart-tv") || navigator.userAgent.toLowerCase().includes("androidtv");

        // Hide Downloads if not in app mode
        if (!isPWA && !isTV) {
            const dl = document.getElementById('dlLink');
            if(dl) dl.style.display = 'none';
        }

        // Fix: Make sure mobile only shows text icons if space permits
        if (window.innerWidth > 600) {
            document.querySelectorAll('.nav-icon').forEach(icon => icon.style.display = 'none');
        }
    </script>
</body>
    </html>
