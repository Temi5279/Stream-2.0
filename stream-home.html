<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>str▶eam - Home</title>
    <style>
        :root { --brand-blue: #0064ff; --bg-dark: #040714; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow-x: hidden; }

        /* LIQUID GLASS NAV */
        .nav-container { background: rgba(4, 7, 20, 0.7); backdrop-filter: blur(20px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1); transition: 0.5s; }
        
        @media (min-width: 1024px) {
            .nav-container { position: sticky; top: 20px; width: fit-content; margin: 0 auto; border-radius: 50px; padding: 12px 40px; display: flex; gap: 60px; }
            .tv-logo { position: fixed; bottom: 40px; right: 50px; font-size: 2.5em; color: var(--brand-blue); font-weight: bold; opacity: 0.8; }
        }
        @media (max-width: 1023px) {
            .nav-container { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0; border-radius: 20px 20px 0 0; }
            .logo-top { text-align: center; padding: 20px 0; font-size: 2.2em; color: var(--brand-blue); font-weight: bold; }
            body { padding-bottom: 80px; }
        }

        .nav-link { color: rgba(255,255,255,0.5); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-link.active { color: var(--brand-blue); text-shadow: 0 0 10px var(--brand-blue); }
        .icon { width: 24px; height: 24px; fill: currentColor; }

        /* HERO & GREETING */
        .hero { height: 85vh; display: flex; align-items: flex-end; padding: 60px; background: linear-gradient(to top, var(--bg-dark), transparent), url('hero-bg.jpg'); background-size: cover; }
        .user-badge { position: absolute; top: 30px; right: 30px; display: flex; align-items: center; gap: 10px; background: var(--glass); padding: 5px 15px; border-radius: 30px; backdrop-filter: blur(10px); }
        .user-badge img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--brand-blue); }
    </style>
</head>
<body>

    <div class="logo-top" id="mobileLogo">str▶eam</div>
    <div class="tv-logo">str▶eam</div>

    <div class="user-badge" id="userBadge" style="display:none;">
        <span id="userName">...</span>
        <img id="userPic" src="">
    </div>

    <nav class="nav-container">
        <a href="stream-home.html" class="nav-link active">
            <svg class="icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
        <a href="live-tv.html" class="nav-link">
            <svg class="icon" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
            <span>Live TV</span>
        </a>
        <a href="profile.html" class="nav-link">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Profile</span>
        </a>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1 id="heroGreeting" style="font-size: 4em; margin-bottom: 10px;">WELCOME BACK</h1>
            <button style="background:white; color:black; padding:12px 40px; border:none; border-radius:5px; font-weight:bold; font-size:1.2em;">▶ Play Now</button>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfkqkhk0z8xuritMgzf4Bhf_N2Na-Co-Y",
            authDomain: "stream-2o.firebaseapp.com",
            projectId: "stream-2o",
            storageBucket: "stream-2o.firebasestorage.app",
            messagingSenderId: "6845983758",
            appId: "1:6845983758:web:f0016e044e8aadb192e05f",
            measurementId: "G-EZSCM2ZX7W"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userBadge').style.display = 'flex';
                document.getElementById('userName').innerText = user.displayName || "Streamer";
                document.getElementById('heroGreeting').innerText = "READY, " + (user.displayName || "STREAMER") + "?";
                if(user.photoURL) document.getElementById('userPic').src = user.photoURL;
            }
        });
    </script>
</body>
</html>
