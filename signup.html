<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | str▶eam</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1a1d29, #040714);
        }
        .signup-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .signup-container h2 { margin-bottom: 10px; font-size: 1.8rem; }
        .plan-summary {
            background: rgba(0, 100, 255, 0.2);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid var(--primary-blue);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #31343e;
            border: none;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
        }
        .btn-finish {
            background: var(--primary-blue);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }
        .switch-auth {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #aaa;
        }
        .switch-auth a { color: white; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="logo" style="text-align: center; margin-bottom: 20px;">str<span>▶</span>eam</div>
        <h2>Create Account</h2>
        
        <div id="planDisplay" class="plan-summary">
            </div>

        <form id="signupForm">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Create Password" required>
            
            <p style="font-size: 0.7rem; color: #888; margin-top: 10px;">
                By clicking "Agree & Continue", you agree to our Terms of Service and Privacy Policy.
            </p>
            
            <button type="submit" class="btn-finish">Agree & Continue</button>
        </form>

        <div class="switch-auth">
            Already have an account? <a href="signin.html">Sign In</a>
        </div>
    </div>

    <script type="module">
        // Import your firebase config
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Get the plan details from the previous page (Local Storage)
        const selectedPlan = localStorage.getItem('selectedPlan') || 'Basic';
        const totalPrice = localStorage.getItem('totalPrice') || '1000';
        
        document.getElementById('planDisplay').innerHTML = `
            <strong>Selected:</strong> Stream ${selectedPlan} <br>
            <strong>Total Due:</strong> NGN ${totalPrice} (Trial Mode: Free)
        `;

        // 2. Handle Sign Up
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Create user in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Save user profile & plan to Firestore
                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    plan: selectedPlan,
                    joinedDate: new Date().toISOString()
                });

                // Success! Redirect to the main app
                alert("Account created successfully!");
                window.location.href = 'stream-home.html'; 

            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>
</body>
</html>
