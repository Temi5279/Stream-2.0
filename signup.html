<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | str▶eam</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #040714; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-container { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 15px; width: 100%; max-width: 450px; text-align: center; }
        .plan-summary { background: rgba(0, 100, 255, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; color: #0064ff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo" style="margin-bottom: 10px;">str<span>▶</span>eam</div>
        <div id="displayPlan" class="plan-summary">Selected Plan: Loading...</div>
        <h2 style="color: white;">Finish Setting Up</h2>
        <form id="signupForm">
            <input type="text" id="fullName" placeholder="Full Name" required style="width:100%; padding:15px; margin:10px 0; background:#31343e; color:white; border:none; border-radius:5px;">
            <input type="email" id="email" placeholder="Email" required style="width:100%; padding:15px; margin:10px 0; background:#31343e; color:white; border:none; border-radius:5px;">
            <input type="password" id="password" placeholder="Create Password" required style="width:100%; padding:15px; margin:10px 0; background:#31343e; color:white; border:none; border-radius:5px;">
            <p style="font-size: 0.8rem; color: #888; text-align: left; margin: 15px 0;">
                By clicking "Agree & Continue", you agree to the updated 2026 Subscriber Agreement.
            </p>
            <button type="submit" class="btn-select">Agree & Continue</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfkqkhk0z8xuritMgzf4Bhf_N2Na-Co-Y",
            authDomain: "stream-2o.firebaseapp.com",
            projectId: "stream-2o",
            storageBucket: "stream-2o.firebasestorage.app",
            messagingSenderId: "6845983758",
            appId: "1:6845983758:web:f0016e044e8aadb192e05f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Show the plan the user picked on index.html
        const selectedPlan = localStorage.getItem('selectedPlan') || "Basic";
        document.getElementById('displayPlan').innerText = "Selected Plan: " + selectedPlan;

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Processing..."; // Visual feedback it's loading
            
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), {
                    name: name,
                    plan: selectedPlan,
                    joinedDate: new Date().toISOString()
                });
                window.location.href = 'stream-home.html';
            } catch (error) {
                btn.innerText = "Agree & Continue";
                alert("Sign Up Error: " + error.message);
            }
        });
    </script>
</body>
</html>
